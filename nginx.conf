# Bangkok Kunsthalle — Nginx reverse proxy config
# Place at /etc/nginx/sites-available/bangkok-kunsthalle
# Symlink: ln -s /etc/nginx/sites-available/bangkok-kunsthalle /etc/nginx/sites-enabled/

# Live site
server {
    listen 80;
    server_name www.bangkok-kunsthalle.org bangkok-kunsthalle.org;
    return 301 https://www.bangkok-kunsthalle.org$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.bangkok-kunsthalle.org bangkok-kunsthalle.org;

    ssl_certificate     /etc/letsencrypt/live/www.bangkok-kunsthalle.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.bangkok-kunsthalle.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # Static assets — long cache
    location /_next/static/ {
        proxy_pass http://localhost:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /images/ {
        proxy_pass http://localhost:3000;
        add_header Cache-Control "public, max-age=86400";
    }

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# Dev site
server {
    listen 80;
    server_name dev.bangkok-kunsthalle.org;
    return 301 https://dev.bangkok-kunsthalle.org$request_uri;
}

server {
    listen 443 ssl http2;
    server_name dev.bangkok-kunsthalle.org;

    ssl_certificate     /etc/letsencrypt/live/dev.bangkok-kunsthalle.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.bangkok-kunsthalle.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
